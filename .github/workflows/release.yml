name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            label: macos-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ImageStript ${{ github.ref_name }}"
          releaseBody: "AI image metadata stripper and watermark removal tool."
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Build CLI binary
        run: cargo build --release --bin stript-cli --target ${{ matrix.target }}

      - name: Package CLI (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist-cli
          cp target/${{ matrix.target }}/release/stript-cli dist-cli/stript-cli-${{ matrix.label }}
          tar -czf dist-cli/stript-cli-${{ matrix.label }}.tar.gz -C dist-cli stript-cli-${{ matrix.label }}

      - name: Package CLI (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir dist-cli
          cp target/${{ matrix.target }}/release/stript-cli.exe dist-cli/stript-cli-${{ matrix.label }}.exe

      - name: Upload GUI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gui-${{ matrix.label }}
          path: target/${{ matrix.target }}/release/bundle/

      - name: Upload CLI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.label }}
          path: dist-cli/

  release:
    needs: [build]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          merge-multiple: true

      - name: List artifacts
        run: find all-artifacts -type f | head -30

      - name: Generate SHA256SUMS
        run: |
          cd all-artifacts
          find . -type f \( -name "*.tar.gz" -o -name "*.exe" -o -name "*.dmg" -o -name "*.msi" -o -name "*.deb" -o -name "*.AppImage" \) -exec sha256sum {} \; > ../SHA256SUMS
          mv ../SHA256SUMS .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "ImageStript ${{ github.ref_name }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            all-artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
